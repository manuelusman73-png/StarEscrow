# rustfmt configuration for StarEscrow
# See: https://rust-lang.github.io/rustfmt/

edition = "2021"

# Maximum width of each line
max_width = 100

# Use tabs for indentation
use_field_init_shorthand = true

# Use try shorthand (?)
use_try_shorthand = true

# Control how generic parameters are formatted
format_macro_matchers = true

# Format code inside doc comments
format_code_in_doc_comments = true

# Wrap comments that exceed max_width
wrap_comments = true

# Use small heuristics for optimal formatting
use_small_heuristics = "Default"

# Control formatting of imports
imports_granularity = "Module"
group_imports = "StdExternalCrate"

# Control formatting of match arms
match_block_trailing_comma = true

# Control formatting of struct literals
struct_lit_single_line = true

# Control formatting of trailing commas
trailing_comma = "Always"

# Control formatting of where clauses
where_single_line = false

# Control formatting of fn parameters
fn_params_layout = "Tall"

# Control formatting of fn args
fn_args_layout = "Tall"

# Control formatting of fn call width
fn_call_width = 60

# Control formatting of attr fn width
attr_fn_like_width = 70

# Control formatting of struct field align threshold
struct_field_align_threshold = 0

# Control formatting of enum variant align threshold
enum_discrim_align_threshold = 0

# Control formatting of array width
array_width = 60

# Control formatting of chain width
chain_width = 60

# Control formatting of single line if let width
single_line_if_else_max_width = 50

# Control formatting of single line while let width
single_line_while_let_max_width = 50
